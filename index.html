<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCC Notes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Quicksand:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <nav class="navbar">
        <h1>LCC Education Notes</h1>
    </nav>

    <div class="tabs-container">
        <button class="tab-button active" onclick="switchTab('internet')">Internet Notes</button>
        <button class="tab-button" onclick="switchTab('webdev')">Web Dev Notes</button>
        <button class="tab-button" onclick="switchTab('clang')">C Lang Notes</button>
    </div>

    <div class="content-container">
        <div id="internet" class="tab-content active">
            <div class="file-upload-area">
                <div class="file-upload-label">
                    📄 Loading Internet Notes PDF...
                </div>
            </div>
            <div id="pdfViewer" style="display: none;">
                <div class="pdf-container">
                    <div class="pdf-controls">
                        <button onclick="previousPage()" id="prevBtn">◀ Previous</button>
                        <span>Page <span id="pageNum">1</span> / <span id="pageCount">1</span></span>
                        <button onclick="nextPage()" id="nextBtn">Next ▶</button>
                        <button onclick="zoomIn()">🔍+</button>
                        <button onclick="zoomOut()">🔍-</button>
                        <button onclick="resetZoom()">Reset Zoom</button>
                    </div>
                    <div class="pdf-canvas-container">
                        <canvas id="pdfCanvas"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div id="webdev" class="tab-content">
            <div class="progress-message">
                <i>🚧</i>
                <h2>Web Development Notes</h2>
                <p style="margin-top: 20px; font-size: 18px;">Coming Soon... In Progress</p>
            </div>
        </div>

        <div id="clang" class="tab-content">
            <div class="progress-message">
                <i>🚧</i>
                <h2>C Language Notes</h2>
                <p style="margin-top: 20px; font-size: 18px;">Coming Soon... In Progress</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
